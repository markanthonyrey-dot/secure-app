name: DevSecOps Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  IMAGE_NAME: secure-app

jobs:
  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov
      - run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t $IMAGE_NAME:${{ github.sha }} .
      - run: docker save $IMAGE_NAME:${{ github.sha }} -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i image.tar
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin
      - name: Run Trivy scan
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 \
          --format table \
          $IMAGE_NAME:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: container-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate deployment
        run: |
          echo 'All security gates passed.'
          echo "Deploying $IMAGE_NAME:${{ github.sha }} to production..."
          echo 'Deployment complete.'
